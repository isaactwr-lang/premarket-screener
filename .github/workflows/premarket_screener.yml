name: Premarket Screener

on:
  schedule:
    # Target ~8:30 AM ET — scheduled 3h early to offset GitHub Actions queue delay (~2.5–4h)
    # 9:30 UTC = 5:30 PM SGT → typically executes around 12:00–13:30 UTC (8:00–9:30 AM ET)
    - cron: "30 9 * * 1-5"
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  run-screener:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run premarket screener
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py

      - name: Upload results JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gappers-${{ github.run_id }}
          path: output/
          retention-days: 30
